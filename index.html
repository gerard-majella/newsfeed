<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industry Newsfeed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #8892a4;
      --border: #2d3347;
      --tag-bg: #1e2640;
      --tag-text: #a5b4fc;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .header-title {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #week-label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Industry select ───────────────────────────────────── */
    .select-wrapper {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem;
    }

    .select-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      font-family: inherit;
      padding: 0.5rem 0.85rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .select-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .select-shell {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .industry-select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      padding: 0.55rem 2.25rem 0.55rem 0.9rem;
      border-radius: var(--radius);
      cursor: pointer;
      min-width: 220px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .industry-select:hover {
      border-color: var(--accent);
    }

    .industry-select:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.25);
    }

    .industry-select option {
      background: var(--surface2);
      color: var(--text);
    }

    .select-shell::after {
      content: "";
      position: absolute;
      right: 0.85rem;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    .industry-count {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Main content ────────────────────────────────────── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .panel-description {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    /* ── Article cards ───────────────────────────────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-title a {
      font-size: 0.975rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      line-height: 1.4;
    }

    .card-title a:hover { color: var(--accent); }

    .card-meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-meta .source {
      font-weight: 600;
      color: var(--accent);
      background: rgba(79,142,247,0.1);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .card-summary {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }

    .actor-tag {
      background: rgba(124, 58, 237, 0.15);
      color: #c4b5fd;
      font-weight: 600;
    }

    /* ── Empty / error states ────────────────────────────── */
    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    #status-banner {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.65rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-title">Industry Newsfeed</span>
    <span id="week-label">Loading…</span>
  </div>
</header>

<div class="select-wrapper">
  <div class="select-inner">
    <div class="filter-group">
      <label class="select-label" for="industry-select">Industry</label>
      <div class="select-shell">
        <select id="industry-select" class="industry-select" aria-label="Select industry"></select>
      </div>
    </div>
    <div class="filter-group">
      <label class="select-label" for="actor-select">Threat actor</label>
      <div class="select-shell">
        <select id="actor-select" class="industry-select" aria-label="Select threat actor">
          <option value="">All actors</option>
        </select>
      </div>
    </div>
    <button id="clear-filters" class="clear-btn" type="button" hidden>Clear filters</button>
    <span class="industry-count" id="industry-count"></span>
  </div>
</div>

<main>
  <div id="status-banner"></div>
  <div id="panels"></div>
</main>

<script>
  // ── Fallback data (used when data.json cannot be fetched) ──────────────────
  const FALLBACK = {
    "updated": "2025-02-24T00:00:00Z",
    "threatActors": [
      { "id": "lockbit", "label": "LockBit" },
      { "id": "akira", "label": "Akira" }
    ],
    "industries": [
      {
        "id": "manufacturing",
        "label": "Manufacturing",
        "description": "Keywords: industrial, manufacturing, ICS",
        "articles": [
          {
            "title": "Sample Article Title",
            "source": "Sample Source",
            "date": "2025-02-24",
            "url": "https://example.com",
            "summary": "A brief summary of the article goes here.",
            "tags": ["ICS", "Manufacturing"],
            "actors": ["Akira"]
          }
        ]
      }
    ]
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function parseDateSafe(iso) {
    if (!iso) return null;
    const dateOnly = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
    const d = dateOnly
      ? new Date(Number(dateOnly[1]), Number(dateOnly[2]) - 1, Number(dateOnly[3]))
      : new Date(iso);
    return Number.isNaN(d.getTime()) ? null : d;
  }
  function formatWeek(iso) {
    const d = parseDateSafe(iso);
    return "Week of " + (d ? d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : (iso || ""));
  }
  function formatDate(iso) {
    const d = parseDateSafe(iso);
    return d ? d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : (iso || "");
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function buildCard(article) {
    const tags = (article.tags || [])
      .map(t => `<span class="tag">${escapeHtml(t)}</span>`)
      .join("");
    const actorBadges = (article.actors || [])
      .map(a => `<span class="tag actor-tag">${escapeHtml(a)}</span>`)
      .join("");

    return `
      <article class="card">
        <div class="card-title">
          <a href="${escapeHtml(article.url || "#")}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(article.title || "Untitled")}
          </a>
        </div>
        <div class="card-meta">
          <span class="source">${escapeHtml(article.source || "")}</span>
          <span class="date">${escapeHtml(formatDate(article.date || ""))}</span>
        </div>
        <p class="card-summary">${escapeHtml(article.summary || "")}</p>
        ${actorBadges || tags ? `<div class="card-tags">${actorBadges}${tags}</div>` : ""}
      </article>`;
  }

  function render(data, usedFallback) {
    const { updated, industries = [] } = data;

    // Header week label
    document.getElementById("week-label").textContent = formatWeek(updated);

    // Status banner
    if (usedFallback) {
      const banner = document.getElementById("status-banner");
      banner.style.display = "block";
      banner.textContent = "ℹ️ Could not load data.json — showing sample data.";
    }

    const industrySelect = document.getElementById("industry-select");
    const actorSelect = document.getElementById("actor-select");
    const clearBtn = document.getElementById("clear-filters");
    const countEl = document.getElementById("industry-count");
    const panelsEl = document.getElementById("panels");

    // "All industries" option lets the actor filter search across every industry at once
    const allOpt = document.createElement("option");
    allOpt.value = "__all__";
    allOpt.textContent = "All industries";
    industrySelect.appendChild(allOpt);

    industries.forEach((industry, idx) => {
      const id = escapeHtml(industry.id || `industry-${idx}`);
      const label = industry.label || id;
      const count = (industry.articles || []).length;

      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = `${label} (${count})`;
      industrySelect.appendChild(opt);
    });
    industrySelect.value = industries[0] ? (industries[0].id || "industry-0") : "__all__";

    // Threat actor dropdown: populated from the master list so it stays stable
    // even when a given actor has zero matches this week.
    const actorList = data.threatActors || [];
    actorList.forEach(actor => {
      const opt = document.createElement("option");
      opt.value = actor.label;
      opt.textContent = actor.label;
      actorSelect.appendChild(opt);
    });

    function buildPanel(industry) {
      const id = escapeHtml(industry.id);
      const panel = document.createElement("div");
      panel.className = "panel";
      panel.id = `panel-${id}`;
      panel.dataset.industryId = industry.id;
      panel.setAttribute("role", "tabpanel");
      panel.innerHTML = `
        ${industry.description ? `<p class="panel-description">${escapeHtml(industry.description)}</p>` : ""}
        <div class="cards"></div>`;
      return panel;
    }

    industries.forEach(industry => panelsEl.appendChild(buildPanel(industry)));

    function applyFilters() {
      const industryFilter = industrySelect.value;
      const actorFilter = actorSelect.value;

      clearBtn.hidden = industryFilter === (industries[0]?.id || "__all__") && !actorFilter;

      panelsEl.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));

      let visibleCount = 0;
      let visiblePanelCount = 0;

      industries.forEach(industry => {
        const showThisIndustry = industryFilter === "__all__" || industryFilter === industry.id;
        if (!showThisIndustry) return;

        const panel = document.getElementById(`panel-${escapeHtml(industry.id)}`);
        const cardsEl = panel.querySelector(".cards");

        const articles = (industry.articles || []).filter(a =>
          !actorFilter || (a.actors || []).includes(actorFilter)
        );

        cardsEl.innerHTML = articles.length
          ? articles.map(buildCard).join("")
          : `<p class="empty">No articles match the current filters.</p>`;

        visibleCount += articles.length;
        panel.classList.add("active");
        visiblePanelCount += 1;
      });

      const label = visiblePanelCount > 1 ? "across selected industries" : "";
      countEl.textContent = visibleCount
        ? `${visibleCount} article${visibleCount === 1 ? "" : "s"} ${label}`.trim()
        : "No matching articles";
    }

    industrySelect.addEventListener("change", applyFilters);
    actorSelect.addEventListener("change", applyFilters);
    clearBtn.addEventListener("click", () => {
      industrySelect.value = industries[0] ? (industries[0].id || "industry-0") : "__all__";
      actorSelect.value = "";
      applyFilters();
    });

    applyFilters();
  }

  // ── Bootstrap ──────────────────────────────────────────────────────────────
  (async () => {
    let data = null;
    let usedFallback = false;

    try {
      const url = `./data.json?_=${Date.now()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (err) {
      console.warn("data.json fetch failed, using fallback:", err);
      data = FALLBACK;
      usedFallback = true;
    }

    render(data, usedFallback);
  })();
</script>
</body>
</html>
